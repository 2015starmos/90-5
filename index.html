<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>水電記錄</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            margin-top: 10px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<h2>水電費記錄</h2>

<input type="text" id="date" placeholder="紀錄時間 (例如 2026-05-28)" value="2026-05-28">
<input type="number" id="kwh" placeholder="用電度數" value="123">
<input type="number" id="cost" placeholder="金額" value="456">
<input type="text" id="note" placeholder="備註" value="測試">

<button onclick="saveData()">儲存到雲端</button>

<script>
// ====================== 你只要改這一行 ======================
const API_URL = "https://script.google.com/macros/s/AKfycbye4_bPE_XktyfESKYqEiIZO0oTFuUINKRfPWDb3-rWIuJLyD3L-jQfCkc0Z2Bi9NV6fQ/exec";
// ============================================================

async function saveData() {
    const data = {
        action: "save",
        date: document.getElementById("date").value,
        kwh: document.getElementById("kwh").value,
        cost: document.getElementById("cost").value,
        note: document.getElementById("note").value
    };

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();
        
        if (result.success) {
            alert("✅ 儲存成功！");
        } else {
            alert("❌ 儲存失敗：" + result.error);
        }
    } catch (err) {
        alert("⚠️ 網路錯誤：" + err);
    }
}
</script>

</body>
</html>
