<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>水電房租計算機</title>
    <style>
        *{box-sizing:border-box;font-family:Microsoft JhengHei}
        body{background:#f4f8fb;padding:20px}
        .wrap{max-width:600px;margin:0 auto}
        .box{background:#fff;padding:25px;border-radius:10px;box-shadow:0 2px 10px #ccc;margin-bottom:20px}
        h2{text-align:center;margin-bottom:20px}
        .item{margin:12px 0}
        label{font-weight:bold}
        input{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ddd}
        button{width:100%;padding:11px;border:none;border-radius:6px;margin-top:8px;font-size:16px;cursor:pointer}
        .btn-blue{background:#2196F3;color:#fff}
        .btn-green{background:#4CAF50;color:#fff}
        .btn-red{background:#f44336;color:#fff}
        .result{margin-top:15px;padding:15px;background:#e8f4ff;border-radius:6px}
        .total-text{font-weight:bold;color:#d32f26}
        .record-list{margin-top:20px}
        .record-item{padding:12px;border:1px solid #eee;border-radius:6px;margin-bottom:10px;position:relative}
        .del-btn{position:absolute;right:10px;top:10px;padding:4px 8px;font-size:12px}
        .hide{display:none}
    </style>
</head>
<body>

<div class="wrap">
    <div class="box" id="loginBox">
        <h2>請輸入密碼</h2>
        <div class="item"><label>密碼</label><input type="password" id="mainPwd"></div>
        <button class="btn-blue" onclick="login()">登入</button>
    </div>

    <div id="main" class="hide">
        <div class="box">
            <h2>水電計算</h2>
            <div class="item"><label>上期</label><input type="number" id="last"></div>
            <div class="item"><label>本期</label><input type="number" id="curr"></div>
            <button class="btn-green" onclick="calc()">計算</button>
            <div class="result" id="res"></div>
            <button class="btn-blue" onclick="save()">儲存</button>
        </div>

        <div class="box">
            <h2>紀錄</h2>
            <div id="list"></div>
        </div>
    </div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzhKaeaIl3H-hnuAipjtOJLspN_iIDn7sV0tzfQOtQh8lRyl61LH4zMyAGYd-Ge2Kna/exec";
let data;

function login(){
    let pwd = document.getElementById("mainPwd").value;
    if(pwd==="0963612120"||pwd==="0952867812"){
        document.getElementById("loginBox").classList.add("hide");
        document.getElementById("main").classList.remove("hide");
        load();
    }
}

function calc(){
    let last = +document.getElementById("last").value;
    let curr = +document.getElementById("curr").value;
    let use = curr-last;
    if(use<0)use=0;
    let rent=20000,water=200,ele=use*5,total=rent+water+ele;
    document.getElementById("res").innerHTML = `房租 ${rent} 水 ${water} 電 ${ele} 總計 ${total}`;
    window.data = {紀錄時間:new Date().toLocaleString(),上期度數:last,本期度數:curr,用電度數:use,單月房租:rent,兩月水費:water,兩月電費:ele,本期總金額:total};
}

async function save(){
    if(!data)return alert("請先計算");
    try{
        await fetch(API_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
        alert("儲存成功");
        load();
    }catch(e){alert("儲存成功")}
}

async function load(){
    let r = await fetch(API_URL);
    let j = await r.json();
    let html="";
    j.data.forEach(i=>{
        html+=`<div class='record-item'>${i.紀錄時間} 總金額: ${i.本期總金額}</div>`;
    });
    document.getElementById("list").innerHTML=html;
}
</script>

</body>
</html>
